services:
  web:
    build: .
    container_name: flask-login-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FLASK_APP: wsgi:app
      STORE_NAME: ${STORE_NAME:-Mi Negocio}
      TZ: America/Asuncion
      MAIL_SERVER: ${MAIL_SERVER:-smtp}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USE_TLS: "false"
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-sistema@stock.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5000}
    ports:
      - "${WEB_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: flask-login-db
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - flask_login_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # Cliente web visual de DB. Arranca siempre con `docker compose up`.
  # Login: System=PostgreSQL, Server=db, User=$POSTGRES_USER, DB=$POSTGRES_DB
  # No exponer este puerto en prod.
  adminer:
    image: adminer:4-standalone
    container_name: flask-login-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    ports:
      - "${ADMINER_PORT:-8080}:8080"

  smtp:
    image: axllent/mailpit:latest
    container_name: flask-login-smtp
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    environment:
      TZ: America/Asuncion

volumes:
  flask_login_pgdata:
