{% extends "base.html" %}
{% block title %}Nueva contraseña · stock{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">Nueva contraseña</h1>
        <p class="text-body-secondary small mb-4">Ingresá tu nueva contraseña. Mínimo 8 caracteres.</p>
        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label" for="password">Nueva contraseña</label>
            <input class="form-control" id="password" name="password" type="password"
                   minlength="8" autocomplete="new-password" required autofocus>
          </div>
          <button class="btn btn-primary w-100" type="submit">Cambiar contraseña</button>
        </form>
        <hr class="my-4">
        <p class="text-center mb-0 text-body-secondary">
          <a href="{{ url_for('auth.login') }}">Volver al login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
