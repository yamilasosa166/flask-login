{% extends "base.html" %}
{% block title %}{{ 'Editar' if categoria else 'Nueva' }} categoria · stock{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h1 class="h4 mb-4">{{ 'Editar' if categoria else 'Nueva' }} categoria</h1>
        <form method="post" novalidate>
          <div class="mb-3">
            <label class="form-label" for="nombre">Nombre</label>
            <input class="form-control" id="nombre" name="nombre" maxlength="80"
                   value="{{ categoria.nombre if categoria else '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="descripcion">Descripcion (opcional)</label>
            <textarea class="form-control" id="descripcion" name="descripcion" rows="2" maxlength="255">{{ categoria.descripcion if categoria else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">{{ 'Guardar' if categoria else 'Crear' }}</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('stock.categorias_list') }}">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
