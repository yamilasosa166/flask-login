{% extends "base.html" %}
{% block title %}Olvidé mi contraseña · stock{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">Olvidé mi contraseña</h1>
        <p class="text-body-secondary small mb-4">Ingresá tu email y te enviamos un enlace para restablecerla.</p>
        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" autocomplete="email" required autofocus>
          </div>
          <button class="btn btn-primary w-100" type="submit">Enviar enlace</button>
        </form>
        <hr class="my-4">
        <p class="text-center mb-0 text-body-secondary">
          <a href="{{ url_for('auth.login') }}">Volver al login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
