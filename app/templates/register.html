{% extends "base.html" %}
{% block title %}Registro · flask-login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-4">Crear cuenta</h1>
        <form method="post" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">Usuario</label>
            <input class="form-control" id="username" name="username" type="text" minlength="3" maxlength="64" autocomplete="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Contrasena</label>
            <input class="form-control" id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
            <div class="form-text">Minimo 8 caracteres.</div>
          </div>
          <button class="btn btn-primary w-100" type="submit">Crear cuenta</button>
        </form>
        <hr class="my-4">
        <p class="text-center mb-0 text-body-secondary">
          Ya tenes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesion</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
